<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Register — LuxEstate</title><link rel="stylesheet" href="style.css"></head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a,#1a1410);padding:40px 20px;">
<div style="background:#141414;padding:50px;border-radius:16px;border:1px solid #2a2a2a;width:100%;max-width:420px;">
<h2 style="margin-bottom:8px">Create Account</h2><p style="color:#888;margin-bottom:25px;font-size:14px">Join LuxEstate today</p>
<form class="form">
<input type="text" placeholder="Full name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm password" required>
<button class="btn-fill" type="submit">Register</button>
</form>
<p style="margin-top:20px;color:#888;font-size:13px;text-align:center">Have an account? <a href="login.html" style="color:#d4a84c">Sign in</a></p>
</div></body></html>
