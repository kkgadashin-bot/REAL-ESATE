{% extends "base.html" %}
{% block content %}
<section class="auth-page">
  <div class="auth-card reveal">
    <h1>Sign In</h1>
    <form method="post">
      <input name="unique_id" placeholder="Enter your Unique ID (e.g. USR-XXXX)" required/>
      <button>Sign In</button>
    </form>
    <p>No account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</section>
{% endblock %}
